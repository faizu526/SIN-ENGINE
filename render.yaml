# 🚀 SIN-ENGINE Render Deployment Configuration
# Go-based Security Automation Platform

services:
  # API Gateway - Main Entry Point
  - type: web
    name: sin-engine-api
    runtime: docker
    plan: free
    autoDeploy: true
    dockerfilePath: backend/api-gateway/Dockerfile
    envVars:
      - key: PORT
        value: "8080"
      - key: GIN_MODE
        value: "release"
      - key: LOG_LEVEL
        value: "info"
